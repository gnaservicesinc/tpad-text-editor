name: tpad-text-editor
title: Tpad
base: core26
version: '7.2.0.1'
summary: Simple text editor
description: |
  A simple, easy to use, fast text editor.

website: https://launchpad.net/tpad-project
source-code: https://git.launchpad.net/tpad-project
issues: https://bugs.launchpad.net/tpad-project
contact: https://bugs.launchpad.net/tpad-project
license: GPL-3.0+
icon: usr/share/icons/tpad.png

grade: stable
confinement: strict
assumes:
  - snapd2.55

# The CUPS snap currently publishes only for these architectures. The
# default-provider below is installed during Snapcraft's pull step, so builds
# for ppc64el and s390x cannot succeed until CUPS publishes those variants.
platforms:
  amd64:
  arm64:
  armhf:
  riscv64:

# The cups content plug causes the print service to be installed when needed.
# It complements the safe, auto-connected cups interface used by the app.
plugs:
  install-cups-runtime:
    interface: content
    content: foo
    default-provider: cups
    target: $SNAP_DATA/cups

apps:
  tpad:
    command: usr/bin/tpad
    desktop: usr/share/applications/tpad.desktop
    command-chain:
      - command-chain/desktop-launch
    environment:
      GTK_USE_PORTAL: '1'
      SNAP_DESKTOP_RUNTIME: $SNAP
    extensions:
      - gpu
    plugs:
      - cups
      - desktop
      - desktop-legacy
      - gsettings
      - home
      - opengl
      - wayland
      - x11

parts:
  # Snapcraft's GNOME extension does not yet support core26. Use Canonical's
  # desktop launcher with this snap as its runtime until that support lands.
  desktop-integration:
    plugin: make
    source: https://github.com/snapcore/snapcraft-desktop-integration.git
    source-type: git
    source-commit: ba67c3d6a9a26029808671d8265ed1d32200e418
    source-subdir: gnome
    make-parameters:
      - PLATFORM_PLUG=desktop
      - WITH_GRAPHICS=false

  tpad:
    plugin: autotools
    source: https://git.launchpad.net/tpad-project
    source-type: git
    autotools-configure-parameters:
      - --prefix=/usr
    build-packages:
      - intltool
      - libgtk-3-dev
      - libgtkspell3-3-dev
      - libgtksourceview-3.0-dev
      - libsystemd-dev
      - pkgconf
    stage-packages:
      - libgtk-3-0t64
      - libgtkspell3-3-0
      - libgtksourceview-3.0-1
      - libsystemd0
      - xdg-user-dirs
